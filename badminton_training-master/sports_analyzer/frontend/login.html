<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网球动作分析系统 - 注册登录</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标库（网球相关图标） -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', // 主色调：蓝色（代表专业、科技）
                        secondary: '#f97316', // 辅助色：橙色（代表活力、运动）
                        dark: '#1e293b',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .tennis-bg {
                background-image: radial-gradient(circle at 30% 20%, rgba(249, 115, 22, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
            }
            .card-shadow {
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            }
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-image: linear-gradient(135deg, #2563eb, #f97316);
            }
        }
    </style>
</head>
<body class="font-inter bg-light min-h-screen tennis-bg flex items-center justify-center p-4 md:p-8">
    <!-- 网球装饰元素（固定定位，不影响布局） -->
    <div class="fixed top-10 left-10 text-secondary/20 text-6xl transform -rotate-12 hidden md:block">
        <i class="fa fa-table-tennis"></i>
    </div>
    <div class="fixed bottom-10 right-10 text-primary/20 text-8xl transform rotate-18 hidden md:block">
        <i class="fa fa-tennis-ball"></i>
    </div>
    <div class="fixed top-1/2 right-1/4 text-secondary/10 text-7xl transform rotate-45 hidden lg:block">
        <i class="fa fa-table-tennis"></i>
    </div>

    <!-- 主容器 -->
    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- 左侧：系统介绍 -->
        <div class="hidden md:flex flex-col justify-center items-center p-8 bg-white/80 backdrop-blur-sm rounded-2xl card-shadow">
            <div class="text-9xl text-gradient mb-6">
                <i class="fa fa-tennis-ball"></i>
            </div>
            <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-dark text-center mb-4">网球动作分析系统</h1>
            <p class="text-gray-600 text-center text-lg max-w-md">
                精准捕捉运动数据，专业分析技术动作，助力提升网球水平
            </p>
        </div>

        <!-- 右侧：注册登录表单 -->
        <div class="bg-white rounded-2xl p-8 card-shadow">
            <div class="text-center mb-8 md:hidden">
                <div class="text-6xl text-gradient mb-2">
                    <i class="fa fa-tennis-ball"></i>
                </div>
                <h2 class="text-2xl font-bold text-dark">网球动作分析系统</h2>
            </div>

            <!-- 选项卡切换 -->
            <div class="flex mb-6 border-b border-gray-200">
                <button id="loginTab" class="flex-1 py-3 text-primary font-medium border-b-2 border-primary">登录</button>
                <button id="registerTab" class="flex-1 py-3 text-gray-500 font-medium hover:text-gray-700 transition-colors">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="loginUsername" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-user"></i>
                        </span>
                        <input type="text" id="loginUsername" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="请输入用户名" required>
                    </div>
                </div>
                <div>
                    <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-lock"></i>
                        </span>
                        <input type="password" id="loginPassword" class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="请输入密码" required>
                        <button type="button" id="toggleLoginPwd" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="rememberMe" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                        <label for="rememberMe" class="ml-2 block text-sm text-gray-600">记住我</label>
                    </div>
                    <a href="#" class="text-sm text-primary hover:text-primary/80 transition-colors">忘记密码？</a>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <i class="fa fa-sign-in mr-2"></i> 登录
                </button>
            </form>

            <!-- 注册表单（默认隐藏） -->
            <form id="registerForm" class="space-y-4 hidden">
                <div>
                    <label for="regUsername" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-user-plus"></i>
                        </span>
                        <input type="text" id="regUsername" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="请设置用户名" required>
                    </div>
                </div>
                <div>
                    <label for="regPassword" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-lock"></i>
                        </span>
                        <input type="password" id="regPassword" class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="请设置密码（不少于6位）" required minlength="6">
                        <button type="button" id="toggleRegPwd" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="regConfirmPwd" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-lock"></i>
                        </span>
                        <input type="password" id="regConfirmPwd" class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="请再次输入密码" required>
                        <button type="button" id="toggleRegConfirmPwd" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-start">
                    <input type="checkbox" id="agreement" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded mt-1" required>
                    <label for="agreement" class="ml-2 block text-sm text-gray-600">
                        我已阅读并同意<a href="#" class="text-primary hover:underline">用户协议</a>和<a href="#" class="text-primary hover:underline">隐私政策</a>
                    </label>
                </div>
                <button type="submit" class="w-full bg-secondary hover:bg-secondary/90 text-white font-medium py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <i class="fa fa-user-plus mr-2"></i> 注册
                </button>
            </form>

            <!-- 分隔线 -->
            <div class="my-6 flex items-center">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="mx-4 text-gray-500 text-sm">其他登录方式</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <!-- 第三方登录 -->
            <div class="flex justify-center space-x-4">
                <button class="w-12 h-12 rounded-full bg-red-50 hover:bg-red-100 flex items-center justify-center text-red-500 transition-colors">
                    <i class="fa fa-google"></i>
                </button>
                <button class="w-12 h-12 rounded-full bg-blue-50 hover:bg-blue-100 flex items-center justify-center text-blue-600 transition-colors">
                    <i class="fa fa-weixin"></i>
                </button>
                <button class="w-12 h-12 rounded-full bg-blue-50 hover:bg-blue-100 flex items-center justify-center text-blue-400 transition-colors">
                    <i class="fa fa-qq"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 选项卡切换逻辑
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            loginTab.classList.remove('text-gray-500');
            registerTab.classList.add('text-gray-500');
            registerTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            registerTab.classList.remove('text-gray-500');
            loginTab.classList.add('text-gray-500');
            loginTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        // 密码显示/隐藏切换
        function setupPwdToggle(toggleBtnId, pwdInputId) {
            const toggleBtn = document.getElementById(toggleBtnId);
            const pwdInput = document.getElementById(pwdInputId);

            toggleBtn.addEventListener('click', () => {
                const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
                pwdInput.setAttribute('type', type);
                toggleBtn.innerHTML = type === 'password' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
            });
        }

        setupPwdToggle('toggleLoginPwd', 'loginPassword');
        setupPwdToggle('toggleRegPwd', 'regPassword');
        setupPwdToggle('toggleRegConfirmPwd', 'regConfirmPwd');

        // 登录表单提交处理
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            // 简单验证（实际项目中需对接后端接口）
            if (username && password) {
                // 存储用户名到本地存储（方便首页显示）
                localStorage.setItem('username', username);
                // 跳转到首页
                window.location.href = 'home.html';
            } else {
                alert('请输入完整的用户名和密码');
            }
        });

        // 注册表单提交处理
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPwd').value;

            if (password !== confirmPwd) {
                alert('两次输入的密码不一致');
                return;
            }

            // 简单注册逻辑（实际项目中需对接后端接口）
            alert(`注册成功！欢迎您，${username}！`);
            // 切换到登录表单
            loginTab.click();
            // 自动填充用户名
            document.getElementById('loginUsername').value = username;
        });
    </script>
</body>
</html>
